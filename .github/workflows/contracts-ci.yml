name: Contract Build Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'nevo_server/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'nevo_server/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build contract
        run: cargo build
        working-directory: ./nevo_server
